<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitLog</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #161618;
      --surface2: #1e1e22;
      --accent: #c8f135;
      --accent2: #8bdc00;
      --text: #f0f0ee;
      --muted: #6b6b72;
      --danger: #ff4c4c;
      --border: #2a2a30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .logo-icon {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
      box-shadow: 0 0 24px rgba(200,241,53,0.35);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px; letter-spacing: 3px;
      color: var(--text); line-height: 1;
    }

    header p { font-size: 13px; color: var(--muted); margin-top: 2px; letter-spacing: 0.5px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 28px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); font-weight: 600;
    }

    input[type=number] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input[type=number]::placeholder { color: var(--muted); }
    input[type=number]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,241,53,0.1);
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Muscle selector */
    .muscle-label {
      font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      font-weight: 600; margin-bottom: 10px;
      display: block;
    }

    .muscle-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .muscle-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .muscle-chip .chip-icon { font-size: 15px; }

    .muscle-chip:hover {
      border-color: rgba(200,241,53,0.4);
      color: var(--text);
    }

    .muscle-chip.selected {
      border-color: var(--accent);
      background: rgba(200,241,53,0.1);
      color: var(--accent);
      box-shadow: 0 0 10px rgba(200,241,53,0.12);
    }

    .muscle-chip.selected .chip-icon {
      filter: none;
    }

    .selection-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      min-height: 18px;
      transition: color 0.2s;
    }

    .selection-hint.has-selection { color: var(--accent); }

    .form-top {
      margin-bottom: 20px;
      max-width: 200px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .btn-save {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(200,241,53,0.2);
    }

    .btn-save:hover { background: var(--accent2); box-shadow: 0 6px 28px rgba(200,241,53,0.35); }
    .btn-save:active { transform: scale(0.98); }

    /* Stats */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; color: var(--accent);
      letter-spacing: 1px; line-height: 1;
    }

    .stat-label {
      font-size: 11px; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted); margin-top: 4px;
    }

    /* Table */
    .table-header {
      display: grid;
      grid-template-columns: 110px 80px 1fr 36px;
      gap: 12px;
      padding: 0 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .table-header span {
      font-size: 10px; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); font-weight: 600;
    }

    .log-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }

    .log-row {
      display: grid;
      grid-template-columns: 110px 80px 1fr 36px;
      gap: 12px;
      align-items: center;
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 14px;
      transition: border-color 0.2s, background 0.2s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-row:hover { border-color: var(--border); background: #232328; }

    .log-date { font-size: 13px; color: var(--muted); }

    .log-weight {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; color: var(--accent); letter-spacing: 1px;
    }
    .log-weight span {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--muted); font-weight: 400;
    }

    .log-muscles {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .mini-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(200,241,53,0.08);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(200,241,53,0.15);
      white-space: nowrap;
    }

    .btn-delete {
      width: 32px; height: 32px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: rgba(255,76,76,0.12);
      color: var(--danger);
      border-color: rgba(255,76,76,0.3);
    }

    .empty { text-align: center; padding: 40px 20px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty p { color: var(--muted); font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent); color: #0d0d0f;
      padding: 12px 24px; border-radius: 100px;
      font-weight: 600; font-size: 14px; letter-spacing: 0.3px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; z-index: 100; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    @media (max-width: 480px) {
      header h1 { font-size: 38px; }
      .stats-bar { grid-template-columns: repeat(3,1fr); }
      .stat-value { font-size: 24px; }
      .table-header, .log-row { grid-template-columns: 90px 64px 1fr 32px; gap: 8px; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo-icon">💪</div>
    <div>
      <h1>FITLOG</h1>
      <p>Track your workouts & progress</p>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="statEntries">0</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statWeight">—</div>
      <div class="stat-label">Latest kg</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">This Week</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">New Entry</div>

    <div class="form-top">
      <div class="field">
        <label for="weight">Body Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 78.5" step="0.1" />
      </div>
    </div>

    <div class="divider"></div>

    <span class="muscle-label">Muscles Trained</span>
    <div class="muscle-grid" id="muscleGrid"></div>
    <div class="selection-hint" id="selectionHint">Select at least one muscle group</div>

    <button class="btn-save" onclick="addLog()">SAVE ENTRY</button>
  </div>

  <div class="card">
    <div class="card-title">Training History</div>
    <div class="table-header" id="tableHeader" style="display:none">
      <span>Date</span>
      <span>Weight</span>
      <span>Muscles</span>
      <span></span>
    </div>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MUSCLES = [
    { id: 'chest',    label: 'Chest',    icon: '🫁' },
    { id: 'back',     label: 'Back',     icon: '🔙' },
    { id: 'shoulders',label: 'Shoulders',icon: '🏈' },
    { id: 'biceps',   label: 'Biceps',   icon: '💪' },
    { id: 'triceps',  label: 'Triceps',  icon: '🦾' },
    { id: 'legs',     label: 'Legs',     icon: '🦵' },
    { id: 'forearms', label: 'Forearms', icon: '🤜' },
    { id: 'abs',      label: 'Abs',      icon: '⚡' },
  ];

  let selected = new Set();
  let logs = JSON.parse(localStorage.getItem("fitlog")) || [];

  // Build chips
  const grid = document.getElementById("muscleGrid");
  MUSCLES.forEach(m => {
    const chip = document.createElement("div");
    chip.className = "muscle-chip";
    chip.dataset.id = m.id;
    chip.innerHTML = `<span class="chip-icon">${m.icon}</span>${m.label}`;
    chip.addEventListener("click", () => toggleMuscle(m.id, chip));
    grid.appendChild(chip);
  });

  function toggleMuscle(id, el) {
    if (selected.has(id)) {
      selected.delete(id);
      el.classList.remove("selected");
    } else {
      selected.add(id);
      el.classList.add("selected");
    }
    updateHint();
  }

  function updateHint() {
    const hint = document.getElementById("selectionHint");
    if (selected.size === 0) {
      hint.textContent = "Select at least one muscle group";
      hint.classList.remove("has-selection");
    } else {
      const names = [...selected].map(id => MUSCLES.find(m => m.id === id).label);
      hint.textContent = `✓ ${names.join(", ")}`;
      hint.classList.add("has-selection");
    }
  }

  function clearChips() {
    selected.clear();
    document.querySelectorAll(".muscle-chip").forEach(c => c.classList.remove("selected"));
    updateHint();
  }

  function saveToStorage() {
    localStorage.setItem("fitlog", JSON.stringify(logs));
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  function updateStats() {
    document.getElementById("statEntries").textContent = logs.length;
    document.getElementById("statWeight").textContent =
      logs.length > 0 ? logs[logs.length - 1].weight : "—";

    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    weekStart.setHours(0,0,0,0);

    const days = new Set(
      logs.filter(l => new Date(l.timestamp || 0) >= weekStart)
          .map(l => new Date(l.timestamp || 0).toDateString())
    );
    document.getElementById("statStreak").textContent = days.size;
  }

  function renderLogs() {
    const list = document.getElementById("logList");
    const header = document.getElementById("tableHeader");
    list.innerHTML = "";

    if (logs.length === 0) {
      header.style.display = "none";
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🏋️</div>
          <p>No entries yet. Log your first session!</p>
        </div>`;
    } else {
      header.style.display = "grid";
      [...logs].reverse().forEach((log, revIdx) => {
        const idx = logs.length - 1 - revIdx;
        const muscles = (log.muscles || []).map(id => {
          const m = MUSCLES.find(x => x.id === id);
          return m ? `<span class="mini-badge">${m.icon} ${m.label}</span>` : '';
        }).join("");

        const row = document.createElement("div");
        row.className = "log-row";
        row.innerHTML = `
          <div class="log-date">${log.date}</div>
          <div class="log-weight">${log.weight}<span> kg</span></div>
          <div class="log-muscles">${muscles}</div>
          <button class="btn-delete" onclick="deleteLog(${idx})" title="Delete">✕</button>
        `;
        list.appendChild(row);
      });
    }
    updateStats();
  }

  function addLog() {
    const weight = document.getElementById("weight").value.trim();
    if (!weight) { showToast("⚠️ Enter your body weight"); return; }
    if (selected.size === 0) { showToast("⚠️ Select at least one muscle"); return; }

    const today = new Date().toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric'
    });

    logs.push({
      date: today,
      weight: parseFloat(weight),
      muscles: [...selected],
      timestamp: Date.now()
    });

    saveToStorage();
    renderLogs();
    document.getElementById("weight").value = "";
    clearChips();
    showToast("✓ Entry saved!");
  }

  function deleteLog(index) {
    logs.splice(index, 1);
    saveToStorage();
    renderLogs();
    showToast("Entry removed");
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") addLog(); });

  renderLogs();
</script>
</body>
</html>
